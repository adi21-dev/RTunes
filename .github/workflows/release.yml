name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive_ext: zip
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive_ext: tar.gz
          - target: x86_64-apple-darwin
            os: macos-13
            archive_ext: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive_ext: tar.gz

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install ALSA dev headers (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y libasound2-dev

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage artifact (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TARGET="${{ matrix.target }}"
          DIST_NAME="rtunes-v${VERSION}-${TARGET}"
          STAGE="dist/${DIST_NAME}"
          mkdir -p "$STAGE/deps"
          cp "target/$TARGET/release/rtunes" "$STAGE/rtunes"
          cp README.md "$STAGE/README.md"
          printf 'Place yt-dlp and ffmpeg here (or install to PATH).\nSee README.md -> deps/ folder.\n' > "$STAGE/deps/README.txt"
          tar -czf "dist/${DIST_NAME}.tar.gz" -C dist "$DIST_NAME"
          echo "ARTIFACT=dist/${DIST_NAME}.tar.gz" >> "$GITHUB_ENV"

      - name: Stage artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $VERSION = $env:GITHUB_REF_NAME -replace '^v',''
          $TARGET = "${{ matrix.target }}"
          $DIST_NAME = "rtunes-v${VERSION}-${TARGET}"
          $STAGE = "dist\$DIST_NAME"
          New-Item -ItemType Directory -Force -Path "$STAGE\deps" | Out-Null
          Copy-Item "target\$TARGET\release\rtunes.exe" "$STAGE\rtunes.exe"
          Copy-Item "README.md" "$STAGE\README.md"
          Set-Content "$STAGE\deps\README.txt" "Place yt-dlp.exe and ffmpeg.exe here (or install to PATH).`nSee README.md -> deps/ folder."
          Compress-Archive -Path "$STAGE\*" -DestinationPath "dist\${DIST_NAME}.zip" -Force
          "ARTIFACT=dist\${DIST_NAME}.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: rtunes-${{ matrix.target }}
          path: ${{ env.ARTIFACT }}

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          generate_release_notes: true
