name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build (${{ matrix.pretty_name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Windows ────────────────────────────────────────────────────────
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            pretty_name: windows-x86_64
            archive_ext: zip
            use_cross: 'false'

          - target: aarch64-pc-windows-msvc
            os: windows-latest
            pretty_name: windows-aarch64
            archive_ext: zip
            use_cross: 'false'

          # ── Linux ──────────────────────────────────────────────────────────
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            pretty_name: linux-x86_64
            archive_ext: tar.gz
            use_cross: 'false'

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            pretty_name: linux-aarch64
            archive_ext: tar.gz
            use_cross: 'true'

          # ── macOS ──────────────────────────────────────────────────────────
          - target: aarch64-apple-darwin
            os: macos-latest
            pretty_name: macos-aarch64
            archive_ext: tar.gz
            use_cross: 'false'

    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Linux dev headers
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y libasound2-dev libwayland-dev

      # cross provides a Docker-based sysroot for aarch64-unknown-linux-gnu,
      # avoiding the need to manually install a cross-linker and aarch64 headers.
      - name: Install cross
        if: matrix.use_cross == 'true'
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build release binary (cross)
        if: matrix.use_cross == 'true'
        run: cross build --release --target ${{ matrix.target }}

      - name: Build release binary
        if: matrix.use_cross != 'true'
        run: cargo build --release --target ${{ matrix.target }}

      # ── Stage + archive (Unix) ──────────────────────────────────────────

      - name: Stage and archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PRETTY="${{ matrix.pretty_name }}"
          TARGET="${{ matrix.target }}"
          DIST_NAME="rtunes-v${VERSION}-${PRETTY}"
          STAGE="dist/${DIST_NAME}"
          mkdir -p "$STAGE"
          cp "target/$TARGET/release/rtunes" "$STAGE/rtunes"
          cp README.md "$STAGE/README.md"
          tar -czf "dist/${DIST_NAME}.tar.gz" -C dist "$DIST_NAME"
          echo "ARTIFACT=dist/${DIST_NAME}.tar.gz" >> "$GITHUB_ENV"

      # ── Stage + archive (Windows) ────────────────────────────────────────

      - name: Stage and archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $VERSION  = $env:GITHUB_REF_NAME -replace '^v', ''
          $PRETTY   = "${{ matrix.pretty_name }}"
          $TARGET   = "${{ matrix.target }}"
          $DIST_NAME = "rtunes-v${VERSION}-${PRETTY}"
          $STAGE    = "dist\$DIST_NAME"
          New-Item -ItemType Directory -Force -Path "$STAGE" | Out-Null
          Copy-Item "target\$TARGET\release\rtunes.exe" "$STAGE\rtunes.exe"
          Copy-Item "README.md" "$STAGE\README.md"
          Compress-Archive -Path "$STAGE\*" -DestinationPath "dist\${DIST_NAME}.zip" -Force
          "ARTIFACT=dist\${DIST_NAME}.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rtunes-${{ matrix.pretty_name }}
          path: ${{ env.ARTIFACT }}

  checksums:
    name: Generate checksums
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate SHA256 checksums
        run: |
          cd artifacts
          sha256sum * > checksums.txt
          cat checksums.txt

      - uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: artifacts/checksums.txt

  release:
    name: Publish GitHub Release
    needs: checksums
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          generate_release_notes: true
          draft: true
